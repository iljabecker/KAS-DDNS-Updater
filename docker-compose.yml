services:
  kas-ddns-updater:
    build: .
    container_name: kas-ddns-updater
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
    # Optional: healthcheck via process running
    healthcheck:
      test: ["CMD", "pgrep", "-f", "ddns_updater"]
      interval: 60s
      timeout: 5s
      retries: 3
